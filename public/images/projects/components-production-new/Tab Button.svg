<svg width="600" height="480" viewBox="0 0 600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="indicatorGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#26A69A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="480" rx="20" fill="#0A0C14"/>

  <!-- Grid accents -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="600" y2="80" stroke="#26A69A"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#26A69A"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#26A69A"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#26A69A"/>
    <line x1="0" y1="400" x2="600" y2="400" stroke="#26A69A"/>
  </g>

  <!-- Header -->
  <text x="36" y="44" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.18em" fill="#26A69A">TAB BUTTON</text>
  <text x="36" y="60" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.04em">2-axis state matrix · WAI-ARIA Tabs Pattern</text>
  <text x="564" y="44" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="end">— 01 / COMPONENT</text>

  <!-- Matrix labels -->
  <text x="36" y="114" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.12em" font-weight="600">SELECTED</text>
  <text x="36" y="214" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.12em" font-weight="600">UNSELECTED</text>

  <!-- Col headers -->
  <text x="170" y="98" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="middle">default</text>
  <text x="294" y="98" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="middle">hover</text>
  <text x="418" y="98" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="middle">focused</text>
  <text x="542" y="98" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="middle">disabled</text>

  <!-- ── ROW 1: SELECTED ── -->

  <!-- Selected / Default -->
  <rect x="122" y="108" width="96" height="44" rx="4" fill="transparent"/>
  <rect x="122" y="148" width="96" height="4" rx="2" fill="#26A69A"/>
  <text x="170" y="135" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F0F4F8" text-anchor="middle">Overview</text>

  <!-- Selected / Hover -->
  <rect x="246" y="108" width="96" height="44" rx="4" fill="#111524"/>
  <rect x="246" y="148" width="96" height="4" rx="2" fill="#26A69A"/>
  <text x="294" y="135" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F0F4F8" text-anchor="middle">Overview</text>

  <!-- Selected / Focused -->
  <rect x="368" y="106" width="100" height="48" rx="6" stroke="#26A69A" stroke-width="2" fill="none"/>
  <rect x="370" y="108" width="96" height="44" rx="4" fill="transparent"/>
  <rect x="370" y="148" width="96" height="4" rx="2" fill="#26A69A"/>
  <text x="418" y="135" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F0F4F8" text-anchor="middle">Overview</text>

  <!-- Selected / Disabled -->
  <rect x="494" y="108" width="96" height="44" rx="4" fill="transparent" opacity="0.4"/>
  <rect x="494" y="148" width="96" height="4" rx="2" fill="#26A69A" opacity="0.25"/>
  <text x="542" y="135" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F0F4F8" text-anchor="middle" opacity="0.35">Overview</text>

  <!-- ── ROW 2: UNSELECTED ── -->

  <!-- Unselected / Default -->
  <rect x="122" y="200" width="96" height="44" rx="4" fill="transparent"/>
  <text x="170" y="227" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#6B7A9A" text-anchor="middle">Vocabulary</text>

  <!-- Unselected / Hover -->
  <rect x="246" y="200" width="96" height="44" rx="4" fill="#111524"/>
  <text x="294" y="227" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#A0AABF" text-anchor="middle">Vocabulary</text>

  <!-- Unselected / Focused -->
  <rect x="368" y="198" width="100" height="48" rx="6" stroke="#26A69A" stroke-width="2" fill="none"/>
  <rect x="370" y="200" width="96" height="44" rx="4" fill="transparent"/>
  <text x="418" y="227" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#A0AABF" text-anchor="middle">Vocabulary</text>

  <!-- Unselected / Disabled -->
  <rect x="494" y="200" width="96" height="44" rx="4" fill="transparent" opacity="0.4"/>
  <text x="542" y="227" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#6B7A9A" text-anchor="middle" opacity="0.4">Vocabulary</text>

  <!-- Separator -->
  <line x1="36" y1="272" x2="564" y2="272" stroke="#161A2A" stroke-width="1"/>

  <!-- ANATOMY SECTION -->
  <text x="36" y="300" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.12em" font-weight="600">ANATOMY</text>

  <!-- Live TabList example -->
  <rect x="36" y="316" width="280" height="56" rx="6" fill="#0F1322"/>

  <!-- Active tab -->
  <text x="76" y="348" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F0F4F8" text-anchor="middle">My Tasks</text>
  <rect x="36" y="368" width="80" height="4" rx="2" fill="url(#indicatorGlow)"/>
  <rect x="36" y="368" width="80" height="4" rx="2" fill="#26A69A"/>

  <!-- Inactive tabs -->
  <text x="160" y="348" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#6B7A9A" text-anchor="middle">Classes</text>
  <text x="248" y="348" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#6B7A9A" text-anchor="middle">Reports</text>

  <!-- Annotation: label -->
  <line x1="76" y1="350" x2="76" y2="390" stroke="#26A69A" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <circle cx="76" cy="350" r="2.5" fill="#26A69A"/>
  <text x="82" y="398" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A">label</text>
  <text x="82" y="410" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">color-text-primary</text>

  <!-- Annotation: indicator -->
  <line x1="160" y1="370" x2="210" y2="408" stroke="#26A69A" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <circle cx="160" cy="370" r="2.5" fill="#26A69A"/>
  <text x="216" y="398" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A">active indicator</text>
  <text x="216" y="410" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">h: 4px · animates on change</text>

  <!-- RIGHT: keyboard + ARIA -->
  <text x="340" y="300" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.12em" font-weight="600">KEYBOARD</text>

  <rect x="340" y="316" width="224" height="48" rx="6" fill="#0F1322"/>
  <rect x="352" y="328" width="34" height="24" rx="3" fill="#161A2A" stroke="#26A69A" stroke-width="1"/>
  <text x="369" y="344" font-family="'Menlo', 'Consolas', monospace" font-size="10" fill="#26A69A" text-anchor="middle">←</text>
  <rect x="390" y="328" width="34" height="24" rx="3" fill="#161A2A" stroke="#26A69A" stroke-width="1"/>
  <text x="407" y="344" font-family="'Menlo', 'Consolas', monospace" font-size="10" fill="#26A69A" text-anchor="middle">→</text>
  <text x="434" y="344" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">cycle · Home / End · Tab exits</text>

  <text x="340" y="388" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.12em" font-weight="600">ARIA</text>

  <rect x="340" y="400" width="224" height="60" rx="6" fill="#0F1322"/>
  <text x="352" y="418" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A">role="tab"</text>
  <text x="352" y="432" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A">aria-selected="true"</text>
  <text x="352" y="446" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">aria-controls="panel-id"</text>
</svg>
