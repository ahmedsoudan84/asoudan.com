<svg width="420" height="360" viewBox="0 0 420 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="heroGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#26A69A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#26A69A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="420" height="360" rx="16" fill="#FFFFFF"/>

  <!-- Glow -->
  <circle cx="210" cy="180" r="140" fill="url(#heroGlow)"/>

  <!-- Label -->
  <text x="210" y="40" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.22em" fill="#26A69A" text-anchor="middle">PROGRESS · 67%</text>

  <!-- Outer motion trace -->
  <circle cx="210" cy="190" r="132" stroke="#26A69A" stroke-width="1" fill="none" stroke-dasharray="2 5" opacity="0.3"/>

  <!-- Track -->
  <circle cx="210" cy="190" r="110" stroke="#161A2A" stroke-width="14" fill="none"/>

  <!-- Arc 67% -->
  <circle
    cx="210" cy="190" r="110"
    stroke="#26A69A" stroke-width="14" fill="none" stroke-linecap="round"
    stroke-dasharray="463 230" stroke-dashoffset="172"
    transform="rotate(-90 210 190)"
  />

  <!-- Centre -->
  <text x="210" y="186" font-family="'Inter', system-ui, sans-serif" font-size="58" font-weight="700" fill="#F0F4F8" text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.03em">67%</text>
  <text x="210" y="220" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6B7A9A" text-anchor="middle">4 of 6 units complete</text>

  <!-- Small dot marker on arc -->
  <circle cx="297" cy="136" r="4" fill="#26A69A"/>
  <circle cx="297" cy="136" r="8" fill="#26A69A" opacity="0.25"/>

  <!-- Footer -->
  <text x="210" y="332" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="middle">stroke-dasharray · color-progress-fill · 400ms ease-out-quart</text>
</svg>
