<svg width="420" height="440" viewBox="0 0 420 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardMedia" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#1E8D82"/>
    </linearGradient>
    <filter id="cardHeroShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#26A69A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="420" height="440" rx="16" fill="#F7F9FB"/>

  <!-- Card -->
  <g filter="url(#cardHeroShadow)">
    <rect x="66" y="60" width="288" height="320" rx="14" fill="#FFFFFF"/>
  </g>
  <rect x="66" y="60" width="288" height="320" rx="14" stroke="#E4E9F0"/>

  <!-- Media -->
  <path d="M 66 74 Q 66 60 80 60 L 340 60 Q 354 60 354 74 L 354 164 L 66 164 Z" fill="url(#cardMedia)"/>

  <text x="92" y="100" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.14em" fill="rgba(255,255,255,0.75)">VOCABULARY · B2</text>
  <text x="92" y="130" font-family="'Inter', system-ui, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" letter-spacing="-0.01em">Academic Vocabulary</text>
  <text x="92" y="150" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.72)">Oxford English Hub · Unit 04</text>

  <rect x="310" y="76" width="32" height="32" rx="16" fill="rgba(255,255,255,0.2)"/>
  <text x="326" y="98" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">★</text>

  <!-- Stats row -->
  <rect x="86" y="184" width="120" height="52" rx="8" fill="#F7F9FB"/>
  <text x="146" y="208" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" fill="#1A2035" text-anchor="middle" letter-spacing="-0.02em">48</text>
  <text x="146" y="224" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#8A97B0" text-anchor="middle" letter-spacing="0.08em">SESSIONS</text>

  <!-- Mini ring -->
  <g transform="translate(278, 210)">
    <circle cx="0" cy="0" r="26" stroke="#EEF2F7" stroke-width="4.5" fill="none"/>
    <circle cx="0" cy="0" r="26" stroke="#26A69A" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-dasharray="108 55" stroke-dashoffset="41" transform="rotate(-90)"/>
    <text x="0" y="-1" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1A2035" text-anchor="middle">72</text>
    <text x="0" y="11" font-family="'Inter', system-ui, sans-serif" font-size="7" fill="#8A97B0" text-anchor="middle" letter-spacing="0.08em">MASTERY</text>
  </g>

  <!-- Body -->
  <text x="86" y="270" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#5A6784">Continue building vocabulary through</text>
  <text x="86" y="286" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#5A6784">contextual practice and spaced recall.</text>

  <!-- CTA -->
  <rect x="86" y="306" width="248" height="44" rx="8" fill="#1A2035"/>
  <text x="210" y="334" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Continue Practice →</text>

  <!-- Bottom label -->
  <text x="210" y="410" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#8A97B0" text-anchor="middle">Skill Card · composes from Card primitive + 2 slots</text>
