<svg width="480" height="480" viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="480" height="480" rx="24" fill="#0A0C14"/>

  <!-- Label -->
  <text x="240" y="44" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.12em" fill="#26A69A" text-anchor="middle" text-transform="uppercase">PROGRESS RING</text>

  <!-- Track ring (lg size, 64px diameter scaled) -->
  <circle cx="240" cy="220" r="120" stroke="#1E2235" stroke-width="16" fill="none"/>

  <!-- Progress arc — 67% = 0.67 × 2π × 120 = ~504.6 dasharray, offset = 754.0 (quarter turn back) -->
  <circle
    cx="240"
    cy="220"
    r="120"
    stroke="#26A69A"
    stroke-width="16"
    fill="none"
    stroke-linecap="round"
    stroke-dasharray="504 250"
    stroke-dashoffset="188"
    transform="rotate(-90 240 220)"
  />

  <!-- Centre value -->
  <text x="240" y="210" font-family="'Inter', system-ui, sans-serif" font-size="52" font-weight="700" fill="#F0F4F8" text-anchor="middle" dominant-baseline="middle">67%</text>
  <text x="240" y="248" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#6B7A9A" text-anchor="middle">4 of 6 units complete</text>

  <!-- Threshold legend -->
  <rect x="80" y="376" width="8" height="8" rx="2" fill="#EB5757"/>
  <text x="96" y="384" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6B7A9A">Below 25%</text>
  <rect x="190" y="376" width="8" height="8" rx="2" fill="#E8A838"/>
  <text x="206" y="384" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6B7A9A">25–75%</text>
  <rect x="298" y="376" width="8" height="8" rx="2" fill="#27AE60"/>
  <text x="314" y="384" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6B7A9A">Above 75%</text>

  <!-- Annotation line + label -->
  <line x1="350" y1="120" x2="310" y2="148" stroke="#26A69A" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="356" y="116" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#26A69A">stroke-dasharray</text>
  <text x="356" y="130" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#6B7A9A">token: progress-ring-fill</text>

  <!-- Size variants row -->
  <text x="240" y="422" font-family="'Inter', system-ui, sans-serif" font-size="10" letter-spacing="0.08em" fill="#3D4460" text-anchor="middle">sm · md · lg — unified stroke-width ratio</text>

  <!-- sm ring -->
  <circle cx="176" cy="448" r="12" stroke="#1E2235" stroke-width="3" fill="none"/>
  <circle cx="176" cy="448" r="12" stroke="#26A69A" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="50 26" stroke-dashoffset="19" transform="rotate(-90 176 448)"/>

  <!-- md ring -->
  <circle cx="228" cy="448" r="18" stroke="#1E2235" stroke-width="4" fill="none"/>
  <circle cx="228" cy="448" r="18" stroke="#26A69A" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="76 37" stroke-dashoffset="28" transform="rotate(-90 228 448)"/>

  <!-- lg ring -->
  <circle cx="292" cy="448" r="26" stroke="#1E2235" stroke-width="5" fill="none"/>
  <circle cx="292" cy="448" r="26" stroke="#26A69A" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="109 54" stroke-dashoffset="40" transform="rotate(-90 292 448)"/>
</svg>
