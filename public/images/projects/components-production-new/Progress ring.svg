<svg width="600" height="480" viewBox="0 0 600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26A69A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#26A69A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#26A69A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#26A69A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="480" rx="20" fill="#0A0C14"/>

  <!-- Grid pattern accent -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="600" y2="80" stroke="#26A69A"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#26A69A"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#26A69A"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#26A69A"/>
    <line x1="0" y1="400" x2="600" y2="400" stroke="#26A69A"/>
  </g>

  <!-- Top row: label + token reference -->
  <text x="36" y="44" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.18em" fill="#26A69A">PROGRESS RING</text>
  <text x="36" y="60" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#5A6784" letter-spacing="0.04em">SVG stroke-dasharray · aria-valuenow · motion-safe</text>

  <text x="564" y="44" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784" text-anchor="end">— 04 / COMPONENT</text>

  <!-- Hero ring, offset left -->
  <circle cx="180" cy="240" r="108" stroke="#161A2A" stroke-width="14" fill="url(#centerGlow)"/>

  <!-- Motion trace outer -->
  <circle cx="180" cy="240" r="124" stroke="url(#ringGlow)" stroke-width="1" fill="none" stroke-dasharray="2 4" opacity="0.6"/>

  <!-- Progress arc — 67% -->
  <circle
    cx="180"
    cy="240"
    r="108"
    stroke="#26A69A"
    stroke-width="14"
    fill="none"
    stroke-linecap="round"
    stroke-dasharray="454 225"
    stroke-dashoffset="169"
    transform="rotate(-90 180 240)"
  />

  <!-- Centre value -->
  <text x="180" y="234" font-family="'Inter', system-ui, sans-serif" font-size="56" font-weight="700" fill="#F0F4F8" text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.02em">67%</text>
  <text x="180" y="270" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#6B7A9A" text-anchor="middle">4 of 6 units complete</text>

  <!-- Ring annotation: stroke-dasharray callout -->
  <line x1="268" y1="160" x2="308" y2="128" stroke="#26A69A" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <circle cx="268" cy="160" r="3" fill="#26A69A"/>
  <text x="312" y="122" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A" font-weight="600">stroke-dasharray</text>
  <text x="312" y="135" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">= circumference × %</text>

  <!-- Ring annotation: arc token -->
  <line x1="130" y1="342" x2="90" y2="372" stroke="#26A69A" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
  <circle cx="130" cy="342" r="3" fill="#26A69A"/>
  <text x="36" y="386" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A" font-weight="600">color-progress-fill</text>
  <text x="36" y="398" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">→ teal-500</text>

  <!-- Right panel: thresholds + states -->
  <text x="350" y="108" font-family="'Inter', system-ui, sans-serif" font-size="10" letter-spacing="0.12em" fill="#5A6784" font-weight="600">COLOUR THRESHOLDS</text>

  <!-- Threshold 1 -->
  <rect x="350" y="120" width="214" height="32" rx="6" fill="#0F1322"/>
  <circle cx="368" cy="136" r="6" fill="#EB5757"/>
  <text x="382" y="140" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#F0F4F8">At risk</text>
  <text x="554" y="140" font-family="'Menlo', 'Consolas', monospace" font-size="10" fill="#5A6784" text-anchor="end">&lt; 25%</text>

  <!-- Threshold 2 -->
  <rect x="350" y="156" width="214" height="32" rx="6" fill="#0F1322"/>
  <circle cx="368" cy="172" r="6" fill="#E8A838"/>
  <text x="382" y="176" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#F0F4F8">In progress</text>
  <text x="554" y="176" font-family="'Menlo', 'Consolas', monospace" font-size="10" fill="#5A6784" text-anchor="end">25 – 75%</text>

  <!-- Threshold 3 -->
  <rect x="350" y="192" width="214" height="32" rx="6" fill="#0F1322"/>
  <circle cx="368" cy="208" r="6" fill="#27AE60"/>
  <text x="382" y="212" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#F0F4F8">On track</text>
  <text x="554" y="212" font-family="'Menlo', 'Consolas', monospace" font-size="10" fill="#5A6784" text-anchor="end">&gt; 75%</text>

  <!-- Motion row -->
  <text x="350" y="252" font-family="'Inter', system-ui, sans-serif" font-size="10" letter-spacing="0.12em" fill="#5A6784" font-weight="600">MOTION</text>

  <rect x="350" y="264" width="214" height="60" rx="6" fill="#0F1322"/>

  <!-- Ease curve visualisation -->
  <path d="M 362 314 Q 398 314 418 298 T 474 274 L 548 274" stroke="#26A69A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="362" cy="314" r="2" fill="#26A69A"/>
  <circle cx="548" cy="274" r="2" fill="#26A69A"/>
  <text x="362" y="282" font-family="'Menlo', 'Consolas', monospace" font-size="8" fill="#5A6784">ease-out-quart · 400ms</text>
  <text x="362" y="340" font-family="'Menlo', 'Consolas', monospace" font-size="8" fill="#5A6784">Respects prefers-reduced-motion</text>

  <!-- ARIA row -->
  <text x="350" y="372" font-family="'Inter', system-ui, sans-serif" font-size="10" letter-spacing="0.12em" fill="#5A6784" font-weight="600">ARIA</text>

  <rect x="350" y="384" width="214" height="40" rx="6" fill="#0F1322"/>
  <text x="362" y="400" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#26A69A">role="progressbar"</text>
  <text x="362" y="414" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">aria-valuenow="67"  aria-valuetext="4 of 6"</text>

  <!-- Size variants bottom -->
  <line x1="36" y1="432" x2="564" y2="432" stroke="#161A2A" stroke-width="1"/>

  <text x="36" y="456" font-family="'Inter', system-ui, sans-serif" font-size="10" letter-spacing="0.12em" fill="#5A6784" font-weight="600">SIZES</text>

  <!-- sm ring -->
  <g transform="translate(120, 452)">
    <circle cx="0" cy="0" r="10" stroke="#161A2A" stroke-width="3" fill="none"/>
    <circle cx="0" cy="0" r="10" stroke="#26A69A" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="42 22" stroke-dashoffset="16" transform="rotate(-90)"/>
    <text x="20" y="4" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">sm · 24</text>
  </g>

  <!-- md ring -->
  <g transform="translate(210, 452)">
    <circle cx="0" cy="0" r="15" stroke="#161A2A" stroke-width="3.5" fill="none"/>
    <circle cx="0" cy="0" r="15" stroke="#26A69A" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="63 32" stroke-dashoffset="24" transform="rotate(-90)"/>
    <text x="26" y="4" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">md · 36</text>
  </g>

  <!-- lg ring -->
  <g transform="translate(310, 452)">
    <circle cx="0" cy="0" r="22" stroke="#161A2A" stroke-width="4.5" fill="none"/>
    <circle cx="0" cy="0" r="22" stroke="#26A69A" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-dasharray="92 47" stroke-dashoffset="35" transform="rotate(-90)"/>
    <text x="34" y="4" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">lg · 56</text>
  </g>

  <!-- 100% celebration state -->
  <g transform="translate(440, 452)">
    <circle cx="0" cy="0" r="15" stroke="#27AE60" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="95 0" transform="rotate(-90)"/>
    <circle cx="-22" cy="-6" r="1.5" fill="#27AE60"/>
    <circle cx="-18" cy="-16" r="1.5" fill="#26A69A"/>
    <circle cx="18" cy="-14" r="1.5" fill="#27AE60"/>
    <circle cx="24" cy="-4" r="1.5" fill="#E8A838"/>
    <text x="0" y="4" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="700" fill="#F0F4F8" text-anchor="middle">100</text>
    <text x="26" y="4" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#5A6784">celebrate</text>
  </g>
</svg>
