  <text x="104" y="140" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#1A2035">Academic Vocabulary · Unit 4</text>
  <text x="104" y="158" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#8A97B0">Started 2 days ago · 4 of 6 lessons complete</text>

