  <text x="36" y="430" font-family="'Inter', system-ui, sans-serif" font-size="10" letter-spacing="0.12em" fill="#8A97B0" font-weight="600">WHEN TO USE</text>

  <rect x="36" y="440" width="168" height="28" rx="6" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
  <text x="50" y="458" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#1A2035" font-weight="600">ListItem</text>
  <text x="110" y="458" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#8A97B0">dense sequential</text>

  <rect x="216" y="440" width="168" height="28" rx="6" fill="#FFFFFF" stroke="#E4E9F0"/>
  <text x="230" y="458" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#1A2035" font-weight="600">Table</text>
  <text x="278" y="458" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#8A97B0">comparative data</text>

  <rect x="396" y="440" width="168" height="28" rx="6" fill="#FFFFFF" stroke="#E4E9F0"/>
  <text x="410" y="458" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#1A2035" font-weight="600">Card</text>
  <text x="456" y="458" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#8A97B0">browsable · rich</text>
