  <text x="564" y="44" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#8A97B0" text-anchor="end">— 02 / COMPONENT</text>

  <!-- Density label: COMFORTABLE -->
  <text x="36" y="100" font-family="'Menlo', 'Consolas', monospace" font-size="9" fill="#8A97B0" letter-spacing="0.08em">COMFORTABLE · 72px</text>

  <!-- Comfortable ListItem -->
  <g filter="url(#listShadow)">
    <rect x="36" y="110" width="528" height="72" rx="10" fill="#FFFFFF"/>
  </g>
  <rect x="36" y="110" width="528" height="72" rx="10" stroke="#E4E9F0"/>

  <!-- Leading media -->
  <rect x="52" y="126" width="40" height="40" rx="8" fill="#26A69A"/>
  <text x="72" y="152" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">U4</text>

