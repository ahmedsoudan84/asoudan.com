    <circle cx="0" cy="0" r="14" stroke="#EEF2F7" stroke-width="3" fill="none"/>
    <circle cx="0" cy="0" r="14" stroke="#26A69A" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="59 30" stroke-dashoffset="22" transform="rotate(-90)"/>
    <text x="0" y="4" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#1A2035" text-anchor="middle">67</text>
  </g>

