<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="accentGlow" cx="0.2" cy="0.25" r="0.9">
      <stop offset="0%" stop-color="#00F1F1" stop-opacity="0.18" />
      <stop offset="55%" stop-color="#00F1F1" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141620" />
      <stop offset="100%" stop-color="#0a0c14" />
    </linearGradient>
    <pattern id="hatch" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="900" fill="#0a0c14"/>
  <rect width="1200" height="900" fill="url(#surface)"/>
  <rect width="1200" height="900" fill="url(#hatch)"/>
  <rect width="1200" height="900" fill="url(#accentGlow)"/>

  <!-- eyebrow -->
  <text x="80" y="150" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="500"
        letter-spacing="4" fill="#00F1F1">v1.0 — DESIGN SYSTEM</text>

  <!-- display type -->
  <text x="80" y="320" font-family="Montserrat, sans-serif" font-size="130" font-weight="700"
        letter-spacing="-4" fill="#ffffff">asoudan<tspan fill="#00F1F1">.</tspan>com</text>
  <text x="80" y="450" font-family="Montserrat, sans-serif" font-size="130" font-weight="200"
        letter-spacing="-4" fill="#ffffff" fill-opacity="0.9">design system.</text>

  <!-- lede -->
  <text x="80" y="540" font-family="Montserrat, sans-serif" font-size="22" font-weight="300"
        fill="#ffffff" fill-opacity="0.7">Dark-first. Montserrat 100–900. A single cyan accent.</text>

  <!-- surface swatches -->
  <g transform="translate(80, 640)">
    <rect x="0"   y="0" width="160" height="90" rx="8" fill="#0a0c14" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="170" y="0" width="160" height="90" rx="8" fill="#141620" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="340" y="0" width="160" height="90" rx="8" fill="#1a1d2e" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="510" y="0" width="160" height="90" rx="8" fill="#23273a" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="680" y="0" width="160" height="90" rx="8" fill="#00F1F1"/>

    <text x="0"   y="115" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.5">#0a0c14</text>
    <text x="170" y="115" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.5">#141620</text>
    <text x="340" y="115" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.5">#1a1d2e</text>
    <text x="510" y="115" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ffffff" fill-opacity="0.5">#23273a</text>
    <text x="680" y="115" font-family="'JetBrains Mono', monospace" font-size="11" fill="#00F1F1">#00F1F1</text>
  </g>

  <!-- opacity ladder -->
  <g transform="translate(80, 800)">
    <rect x="0"   y="0" width="70" height="30" fill="#ffffff" fill-opacity="1.00"/>
    <rect x="75"  y="0" width="70" height="30" fill="#ffffff" fill-opacity="0.70"/>
    <rect x="150" y="0" width="70" height="30" fill="#ffffff" fill-opacity="0.50"/>
    <rect x="225" y="0" width="70" height="30" fill="#ffffff" fill-opacity="0.30"/>
    <rect x="300" y="0" width="70" height="30" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="375" y="0" width="70" height="30" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="450" y="0" width="70" height="30" fill="#ffffff" fill-opacity="0.05"/>
    <text x="545" y="21" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ffffff" fill-opacity="0.5">12-step foreground opacity ladder</text>
  </g>
</svg>
